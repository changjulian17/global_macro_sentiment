name: Deploy Report to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      try_fintwit:
        description: "Try FinTwit (auto-fallback to skip if unavailable)"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "15 0 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build report and stage Pages files
        run: bash scripts/publish_pages.sh
        env:
          TRY_FINTWIT: ${{ inputs.try_fintwit }}

      - name: Commit updated sentiment history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sentiment.db
          git diff --cached --quiet || git commit -m "Update sentiment history [skip ci]"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
